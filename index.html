<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

h1 {
  margin-top: 20px;
}

.board {
  display: grid;
  grid-template-columns: repeat(3, 90px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.cell {
  width: 90px;
  height: 90px;
  background: #1e293b;
  font-size: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 12px;
  transition: 0.3s;
}

.cell:hover {
  background: #334155;
  transform: scale(1.1);
}

.win {
  background: #22c55e !important;
  animation: blink 0.5s infinite;
}

@keyframes blink {
  50% { opacity: 0.5; }
}

button {
  margin: 10px;
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: white;
}

#menu {
  margin-top: 30px;
}

#game {
  display: none;
}

#celebration {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  color: yellow;
  animation: pop 1s ease;
}

@keyframes pop {
  from { transform: scale(0); }
  to { transform: scale(1); }
}
</style>
</head>

<body onclick="enableSound()">

<h1>Tic Tac Toe Pro 🔥</h1>

<div id="menu">
  <h2>Select Mode</h2>
  <button onclick="startGame('friend')">👥 Friend</button>
  <button onclick="startGame('bot')">🤖 Computer</button>
</div>

<div id="game">
  <h2 id="status"></h2>
  <div class="board" id="board"></div>
  <h3 id="score">X: 0 | O: 0</h3>
  <button onclick="resetGame()">Reset</button>
  <button onclick="goMenu()">Back</button>
</div>

<div id="celebration">🎉 WINNER 🎉</div>

<script>

// 🔊 SOUND
const clickSound = new Audio("https://www.soundjay.com/button/sounds/button-16.mp3");
const winSound = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");

// enable mobile sound
function enableSound(){
  clickSound.play().catch(()=>{});
  winSound.play().catch(()=>{});
}

let board = ["","","","","","","","",""];
let currentPlayer = "X";
let gameActive = true;
let vsBot = false;

let scoreX = 0;
let scoreO = 0;

const winPatterns = [
 [0,1,2],[3,4,5],[6,7,8],
 [0,3,6],[1,4,7],[2,5,8],
 [0,4,8],[2,4,6]
];

// 🎮 START GAME
function startGame(mode){
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";

  vsBot = (mode==="bot");
  resetGame();
}

// 🎯 CREATE BOARD
function createBoard(){
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML="";

  board.forEach((cell,i)=>{
    let div = document.createElement("div");
    div.classList.add("cell");
    div.innerText = cell;

    div.onclick = ()=>makeMove(i);

    boardDiv.appendChild(div);
  });
}

// 🧠 SMART AI (MINIMAX)
function bestMove(){
  let bestScore = -Infinity;
  let move;

  for(let i=0;i<9;i++){
    if(board[i]==""){
      board[i]="O";
      let score = minimax(board,0,false);
      board[i]="";
      if(score>bestScore){
        bestScore = score;
        move = i;
      }
    }
  }
  makeMove(move);
}

function minimax(board,depth,isMax){
  let result = checkWinner();
  if(result!==null){
    return result==="O"?1:result==="X"?-1:0;
  }

  if(isMax){
    let best=-Infinity;
    for(let i=0;i<9;i++){
      if(board[i]==""){
        board[i]="O";
        best=Math.max(best,minimax(board,depth+1,false));
        board[i]="";
      }
    }
    return best;
  } else {
    let best=Infinity;
    for(let i=0;i<9;i++){
      if(board[i]==""){
        board[i]="X";
        best=Math.min(best,minimax(board,depth+1,true));
        board[i]="";
      }
    }
    return best;
  }
}

// 🎯 MOVE
function makeMove(i){
  clickSound.currentTime=0;
  clickSound.play().catch(()=>{});

  if(board[i]!=="" || !gameActive) return;

  board[i]=currentPlayer;
  createBoard();

  if(checkWin()){
    winSound.play().catch(()=>{});
    showWin();
    updateScore();
    gameActive=false;
    return;
  }

  if(!board.includes("")){
    document.getElementById("status").innerText="Draw 😅";
    gameActive=false;
    return;
  }

  currentPlayer = currentPlayer==="X"?"O":"X";
  document.getElementById("status").innerText="Turn: "+currentPlayer;

  if(vsBot && currentPlayer==="O"){
    setTimeout(bestMove,500);
  }
}

// 🏆 CHECK WIN
function checkWin(){
  return winPatterns.some(pattern=>{
    let [a,b,c]=pattern;
    if(board[a] && board[a]===board[b] && board[a]===board[c]){
      highlight(pattern);
      return true;
    }
  });
}

function highlight(pattern){
  const cells=document.querySelectorAll(".cell");
  pattern.forEach(i=>cells[i].classList.add("win"));
}

// 🎉 CELEBRATION
function showWin(){
  let box=document.getElementById("celebration");
  box.innerText = currentPlayer+" Wins 🎉";
  box.style.display="flex";

  setTimeout(()=>{
    box.style.display="none";
  },2000);
}

// 📊 SCORE
function updateScore(){
  if(currentPlayer==="X") scoreX++;
  else scoreO++;

  document.getElementById("score").innerText=
    `X: ${scoreX} | O: ${scoreO}`;
}

// 🔁 RESET
function resetGame(){
  board=["","","","","","","","",""];
  gameActive=true;
  currentPlayer="X";

  document.getElementById("status").innerText="Turn: X";
  createBoard();
}

// 🔙 MENU
function goMenu(){
  document.getElementById("game").style.display="none";
  document.getElementById("menu").style.display="block";
}

createBoard();

</script>
</body>
</html>
