<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

/* MENU */
#menu {
  margin-top: 100px;
}

button {
  padding: 12px 25px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  background: #00ffcc;
  color: black;
}

/* GAME AREA */
#game {
  display: none;
}

.board {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  gap: 10px;
  justify-content: center;
  margin-top: 30px;
}

.cell {
  width: 100px;
  height: 100px;
  background: #222;
  font-size: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.win {
  background: green !important;
}

#status {
  margin-top: 15px;
  font-size: 20px;
}

#score {
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <h1>Tic Tac Toe Pro 🔥</h1>
  <button onclick="startGame('friend')">👥 Play with Friend</button>
  <button onclick="startGame('bot')">🤖 Play with Computer</button>
</div>

<!-- GAME -->
<div id="game">
  <h2 id="status"></h2>
  <div class="board" id="board"></div>
  <h3 id="score">X: 0 | O: 0</h3>
  <button onclick="resetGame()">🔄 Reset</button>
  <button onclick="goMenu()">⬅ Back</button>
</div>

<script>
let board = ["","","","","","","","",""];
let currentPlayer = "X";
let gameActive = true;
let vsComputer = false;
let scoreX = 0;
let scoreO = 0;

const winPatterns = [
 [0,1,2],[3,4,5],[6,7,8],
 [0,3,6],[1,4,7],[2,5,8],
 [0,4,8],[2,4,6]
];

function startGame(mode) {
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  vsComputer = (mode === "bot");
  resetGame();
}

function createBoard() {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";

  board.forEach((cell, i) => {
    let div = document.createElement("div");
    div.classList.add("cell");
    div.innerText = cell;
    div.onclick = () => makeMove(i);
    boardDiv.appendChild(div);
  });
}

function makeMove(i) {
  if (board[i] !== "" || !gameActive) return;

  board[i] = currentPlayer;
  createBoard();

  if (checkWin()) {
    document.getElementById("status").innerText = currentPlayer + " Wins 🎉";
    updateScore();
    gameActive = false;
    return;
  }

  if (!board.includes("")) {
    document.getElementById("status").innerText = "Draw 😐";
    gameActive = false;
    return;
  }

  currentPlayer = currentPlayer === "X" ? "O" : "X";
  document.getElementById("status").innerText = "Turn: " + currentPlayer;

  if (vsComputer && currentPlayer === "O") {
    setTimeout(botMove, 500);
  }
}

function botMove() {
  let empty = board.map((v,i) => v === "" ? i : null).filter(v => v !== null);
  let move = empty[Math.floor(Math.random() * empty.length)];
  makeMove(move);
}

function checkWin() {
  return winPatterns.some(pattern => {
    let [a,b,c] = pattern;
    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      highlightWin(pattern);
      return true;
    }
  });
}

function highlightWin(pattern) {
  const cells = document.querySelectorAll(".cell");
  pattern.forEach(i => cells[i].classList.add("win"));
}

function updateScore() {
  if (currentPlayer === "X") scoreX++;
  else scoreO++;
  document.getElementById("score").innerText = `X: ${scoreX} | O: ${scoreO}`;
}

function resetGame() {
  board = ["","","","","","","","",""];
  gameActive = true;
  currentPlayer = "X";
  document.getElementById("status").innerText = "Turn: X";
  createBoard();
}

function goMenu() {
  document.getElementById("game").style.display = "none";
  document.getElementById("menu").style.display = "block";
}
</script>

</body>
</html>
